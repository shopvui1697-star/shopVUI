services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shopvui
      MYSQL_USER: shopvui
      MYSQL_PASSWORD: shopvui_dev
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - ./tooling:/app/tooling
      - web_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages:/app/packages
      - ./tooling:/app/tooling
      - admin_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development

  api:
    depends_on:
      - mysql
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./tooling:/app/tooling
      - api_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://shopvui:shopvui_dev@mysql:3306/shopvui

volumes:
  mysql_data:
  web_node_modules:
  admin_node_modules:
  api_node_modules:
